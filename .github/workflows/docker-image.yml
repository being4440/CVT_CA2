name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ci_cd_app:latest .
        docker images   # 👈 DEBUG: shows if image exists

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/ci_cd_app:latest
